<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Contact | Personal Portfolio</title>
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>
  <header>
    <div class="container topbar">
      <div class="brand">Renz Gabun</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>

      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Contact Me</h1>
    <div class="grid grid-2">
      <article class="card">
        <h2>Get in Touch</h2>
        <p>Email: renz.gabun10@gmail.com</p>
        <p>Phone: +63 900 123 4567</p>
        <p>Address: Angeles City, Pampanga</p>
      </article>
      <article class="card">
        <h2>Message Form</h2>
        <form>
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="Your full name" required>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message here"></textarea>
          <button type="submit">Send Message</button>
        </form>
      </article>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-links">
          <a href="about.html">About</a>
